name: Build and Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/debug.keystore
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"
          else
            # Use the committed debug.keystore so every build is signed with the
            # same key and APK updates work without uninstalling first.
            echo "KEYSTORE_PASSWORD=android" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=drumtrainer" >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=android" >> "$GITHUB_ENV"
          fi
          echo "KEYSTORE_FILE=${{ github.workspace }}/app/debug.keystore" >> "$GITHUB_ENV"

      - name: Build debug APK
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: ./gradlew assembleDebug

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: 4DrumTrainer v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          body: |
            Debug APK built from commit ${{ github.sha }}.

            Install on your device by downloading the `4drum-*.apk` file below.
            Every build is signed with the same key, so you can install this update over a previously installed version without uninstalling first.
          files: app/build/outputs/apk/debug/4drum-*.apk
          token: ${{ secrets.GITHUB_TOKEN }}
