name: Build and Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup keystore
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "::warning::KEYSTORE_BASE64 secret is not set. Generating a one-time keystore." \
                 "This APK cannot be installed over a version signed with a different key." \
                 "See the 'CI/CD — Automatic APK Releases' section in README.md for setup instructions."
            keytool -genkeypair \
              -keystore app/debug.keystore \
              -alias drumtrainer \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=4DrumTrainer, O=4DrumTrainer, C=DE" \
              -noprompt
            echo "KEYSTORE_PASSWORD=android" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=drumtrainer" >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=android" >> "$GITHUB_ENV"
            echo "KEYSTORE_EPHEMERAL=true" >> "$GITHUB_ENV"
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/debug.keystore
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"
            echo "KEYSTORE_EPHEMERAL=false" >> "$GITHUB_ENV"
          fi
          echo "KEYSTORE_FILE=${{ github.workspace }}/app/debug.keystore" >> "$GITHUB_ENV"

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$KEYSTORE_EPHEMERAL" = "true" ]; then
            echo "signing_note=This build was signed with a one-time generated key (KEYSTORE_BASE64 secret not set). You must uninstall any previous version before installing this APK." >> "$GITHUB_OUTPUT"
          else
            echo "signing_note=Because every build is signed with the same key, you can install this update over a previously installed version without uninstalling first." >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: 4DrumTrainer v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          body: |
            Debug APK built from commit ${{ github.sha }}.

            Install on your device by downloading `app-debug.apk` below.
            ${{ steps.version.outputs.signing_note }}
          files: app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
