name: Build and Release APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/debug.keystore
          else
            keytool -genkeypair -v \
              -keystore app/debug.keystore \
              -alias debugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug, O=Android, C=US" \
              -storepass android \
              -keypass android
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/app/debug.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD != '' && secrets.KEYSTORE_PASSWORD || 'android' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS != '' && secrets.KEY_ALIAS || 'debugkey' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD != '' && secrets.KEY_PASSWORD || 'android' }}

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-build${{ github.run_number }}
          name: 4DrumTrainer v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          body: |
            Debug APK built from commit ${{ github.sha }}.

            Install on your device by downloading `app-debug.apk` below.
            Because every build is signed with the same key, you can install
            this update over a previously installed version without uninstalling first.
          files: app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
